<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>KTIENXIOS SHOP</title>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
body{
background:#0f0f1a;
color:white;
font-family:sans-serif;
text-align:center;
padding:30px;
}
.box{
background:#1a1a2e;
padding:20px;
border-radius:10px;
margin:20px auto;
max-width:400px;
}
button{
width:100%;
padding:15px;
margin:10px 0;
border:none;
border-radius:10px;
background:#7a00ff;
color:white;
font-size:16px;
cursor:pointer;
}
</style>
</head>

<body>

<h1>KTIENXIOS SHOP</h1>

<div class="box">

<button onclick="buyKey(1,10000)">KEY 1 NGÀY - 10K</button>
<button onclick="buyKey(7,30000)">KEY 7 NGÀY - 30K</button>
<button onclick="buyKey(30,80000)">KEY 30 NGÀY - 80K</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA0dK1mXKkz9lRxLJzLQ7wsTKQaYVAWz7o",
  authDomain: "ktienxios-key-v2.firebaseapp.com",
  databaseURL: "https://ktienxios-key-v2-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ktienxios-key-v2"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.buyKey = async function(days, price){

// tạo key
let key = "VIP-"+Math.random().toString(36).substring(2,10).toUpperCase();

// tạo ngày hết hạn
let date = new Date();
date.setDate(date.getDate()+days);
let expire = date.toISOString().split("T")[0];

// lưu lên firebase
await set(ref(db,"keys/"+key),{
device:"",
expire:expire
});

// hiện key
Swal.fire({
title:"Key của bạn",
text:key,
confirmButtonText:"Copy"
}).then(()=>{
navigator.clipboard.writeText(key);
});

}

</script>

</body>
</html>
